name: Secure Interactive Debugging

on:
  workflow_dispatch:

jobs:
  debug-session:
    runs-on: windows-latest

    steps:
      - name: Verify Environment and Generate Dynamic Credentials
        shell: powershell
        run: |
          # Generate a random 16-character complex password at runtime
          $assembly = [Reflection.Assembly]::LoadWithPartialName("System.Web")
          $randomPassword = [System.Web.Security.Membership]::GeneratePassword(16, 3) + "aA1!"
          
          # Mask the password in the GitHub logs so it cannot be leaked
          Write-Output "::add-mask::$randomPassword"
          
          # Save to environment for subsequent steps safely
          Add-Content -Path $env:GITHUB_ENV -Value "DEBUG_PASS=$randomPassword"
          Add-Content -Path $env:GITHUB_ENV -Value "DEBUG_USER=DebugAdmin"

      - name: Secure Network Initialization
        shell: powershell
        run: |
          try {
              $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
              $path = "$env:TEMP\secure_net.msi"
              
              Write-Host "Downloading network dependency..."
              Invoke-WebRequest $url -OutFile $path -ErrorAction Stop
              
              Write-Host "Installing network interface..."
              $proc = Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait -PassThru
              if ($proc.ExitCode -ne 0) { throw "Installation failed with exit code $($proc.ExitCode)" }
          }
          catch {
              Write-Error "Network setup failed: $_"
              exit 1
          }

      - name: Connect Routing Tunnel
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          Start-Sleep -Seconds 15
          
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if (-not $ip) {
              Write-Error "Failed to obtain secure routing IP address."
              exit 1
          }
          Add-Content -Path $env:GITHUB_ENV -Value "ASSIGNED_IP=$ip"

      - name: Enforce Access Control Policies
        shell: powershell
        run: |
          # Enable connection protocol
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          
          # Secure firewall to allow only specified protocol groups
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-NetFirewallRule -DisplayGroup "Remote Desktop" -Profile Any

          # Ensure dependent services are verified operational
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService, UmRdpService -ErrorAction SilentlyContinue

      - name: Provision Ephemeral Administrative User
        shell: powershell
        run: |
          $secPassword = ConvertTo-SecureString $env:DEBUG_PASS -AsPlainText -Force
          
          if (-not (Get-LocalUser -Name $env:DEBUG_USER -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $env:DEBUG_USER -Password $secPassword -AccountNeverExpires -Description "Temporary CI Debug Account"
          }
          
          Add-LocalGroupMember -Group "Administrators" -Member $env:DEBUG_USER -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $env:DEBUG_USER -ErrorAction SilentlyContinue

      - name: Secure Output Summary
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "====== SECURE CONNECTION TOPOLOGY ======"
          Write-Host "Target Endpoint : $env:ASSIGNED_IP"
          Write-Host "Authorized User : $env:DEBUG_USER"
          Write-Host "Access Token    : [MASKED BY SYSTEM FOR SECURITY]"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Note: Retrieve the generated password from your secure local setup if required."

      - name: Await Debugging Session Interaction
        shell: powershell
        run: |
          Write-Host "Runner holding for live interaction. Cancel job to tear down."
          $timeout = New-TimeSpan -Hours 5 -Minutes 30
          $sw = [Diagnostics.Stopwatch]::StartNew()
          
          while ($sw.Elapsed -lt $timeout) {
              Start-Sleep -Seconds 60
          }
